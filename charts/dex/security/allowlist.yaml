# Accepted findings for the dex v2.44.0 image (latest upstream release as of
# 2026-07-21; the alpine-based image ships openssl 3.5.1-r0 and is built with
# go1.24.5 and correspondingly old go modules — no rebuild with the fixed
# packages is published). Re-review on next upstream release. The -distroless
# image variant would drop the apk (openssl/musl) findings below if the
# runtime switches to it.
vulnerabilities:
  # openssl (libcrypto3/libssl3 apk): fixed in alpine openssl 3.5.4-r0
  # through 3.5.7-r0; the dex v2.44.0 image ships 3.5.1-r0.
  - id: CVE-2025-15467
    statement: &openssl Fixed in alpine openssl 3.5.4-r0..3.5.7-r0; no dex image ships it (v2.44.0 is latest, with 3.5.1-r0). Re-review on next upstream release.
